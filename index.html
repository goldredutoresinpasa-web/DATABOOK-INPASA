<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Data Book Digital - Equipamentos</title>
  <style>
    /* Correções de Layout e Fixação */
    body { font-family: Arial, sans-serif; margin: 0; color: #003366; background-attachment: fixed; }
    
    .topo { 
        position: sticky; top: 0; background: #fff; z-index: 1000; 
        padding: 20px; border-bottom: 2px solid #ccc; display: flex; justify-content: space-between; 
    }
    
    .container .card { 
        position: sticky; top: 120px; background: #f4f4f4; z-index: 999; padding: 20px; border-bottom: 1px solid #ddd;
    }

    /* Estilo para os cards "S/TAG" (Cinza) */
    .equipamento-card.card-cinza {
        background-color: #d3d3d3 !important;
        border: 1px solid #999 !important;
    }

    /* Mantendo seus estilos originais de card (simplificado para o exemplo) */
    .grid-equipamentos { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; padding: 20px; }
    .equipamento-card { display: block; padding: 15px; border: 1px solid #ccc; background: white; text-decoration: none; color: inherit; border-radius: 8px; }
  </style>
</head>
<body>

  <header class="topo">
    <div>
      <h1>Data Book Digital</h1>
      <p>Consulta de equipamentos por TAG</p>
    </div>
    <div class="logo">GOLD<br>REDUTORES</div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Equipamentos cadastrados</h2>
      <input class="busca" id="busca" type="text" placeholder="Exemplo: ME-631011, motoredutor, WEG...">
    </section>

    <section class="grid-equipamentos" id="listaEquipamentos">
      <a class="equipamento-card card-cinza" href="equipamentos/S-TAG/index.html" data-busca="s/tag motoredutor v58 cos7531/06">
        <strong>S/TAG</strong>
        <span>MOTOREDUTOR</span>
      </a>
      
      </section>
  </main>

  <script>
    const campoBusca = document.getElementById("busca");
    const cards = document.querySelectorAll(".equipamento-card");

    campoBusca.addEventListener("input", function() {
      const termo = campoBusca.value.toLowerCase().trim();
      cards.forEach(card => {
        const texto = card.getAttribute("data-busca");
        card.style.display = texto.includes(termo) ? "block" : "none";
      });
    });
  </script>
</body>
</html>
