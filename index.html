<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Data Book Digital - Equipamentos</title>
  <link rel="stylesheet" href="assets/css/style.css">
  
  <style>
    /* --- EFEITO GLOW (APENAS PARA A BUSCA) --- */
    .card-glow {
      width: 100%;
      max-width: 600px;
      margin: 30px auto;
      height: 140px; /* Altura fixa para o card de busca */
      position: relative;
      border-radius: 20px;
    }

    .card-glow-content {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #001f3f; /* Cor de fundo do seu card */
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px;
      z-index: 2;
    }

    .glow {
      position: absolute;
      inset: -3px; /* Espessura da borda */
      background: linear-gradient(45deg, #007bff, #00d4ff);
      border-radius: 23px;
      filter: blur(8px);
      z-index: 1;
    }

    #busca {
      width: 80%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    /* --- MANTENDO O LAYOUT DOS CARDS ORIGINAIS --- */
    /* Garante que a grid não seja afetada pelo estilo da busca */
    #listaEquipamentos {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 15px;
        padding: 20px;
    }
    
    .equipamento-card {
        display: block; 
        padding: 15px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        text-decoration: none;
        color: #003366;
    }
  </style>
</head>
<body>

  <header class="topo">
    <h1>Data Book Digital</h1>
  </header>

  <main class="container">
    
    <section class="card-glow" role="button">
      <span class="glow"></span>
      <div class="card-glow-content">
        <h2 style="margin:0; color:white;">Equipamentos cadastrados</h2>
        <input class="busca" id="busca" type="text" placeholder="Pesquisar...">
      </div>
    </section>

    <section class="grid-equipamentos" id="listaEquipamentos">
       <a class="equipamento-card" href="#" data-busca="re-631011 motoredutor">
          <strong>RE-631011</strong><br><span>MOTOREDUTOR</span>
       </a>
       </section>
  </main>

  <script>
    const campoBusca = document.getElementById("busca");
    const cards = document.querySelectorAll(".equipamento-card");

    campoBusca.addEventListener("input", function() {
      const termo = campoBusca.value.toLowerCase().trim();
      cards.forEach(card => {
        // A lógica de busca continua buscando no atributo data-busca
        const texto = card.getAttribute("data-busca") || "";
        card.style.display = texto.includes(termo) ? "block" : "none";
      });
    });
  </script>
</body>
</html>
